<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Facebook</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            margin: 0;
            color: #2d3436;
            background: #fdfbf7;
        }
        main {
            text-align: center;
            padding: 24px;
        }
    </style>
</head>
<body>
    <main>
        <h1>Đang hoàn tất đăng nhập Facebook...</h1>
        <p>Bạn có thể đóng cửa sổ này nếu trình duyệt không tự đóng.</p>
    </main>
    <script>
        (function () {
            const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
            const queryParams = new URLSearchParams(window.location.search.replace(/^\?/, ''));
            const params = hashParams.toString() ? hashParams : queryParams;
            const error = params.get('error_message') || params.get('error_description') || params.get('error');
            const payload = {
                type: 'sonic-facebook-login',
                accessToken: params.get('access_token'),
                state: params.get('state'),
                error: error ? `Facebook: ${error}` : ''
            };

            if (window.opener && !window.opener.closed) {
                window.opener.postMessage(payload, window.location.origin);
            }
            window.setTimeout(function () {
                window.close();
            }, 300);
        })();
    </script>
</body>
</html>
